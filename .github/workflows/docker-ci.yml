name: Java CI

on:
  push:
    branches: ["**"]

  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-
            

      - name: Build Java
        run: mvn clean install -Dspring.profiles.active=test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t xanderg19/order_api:$TAG .
          docker tag xanderg19/order_api:$TAG xanderg19/order_api:latest

      - name: Push Docker Images
        if: github.ref == 'refs/heads/main'
        run: |
          docker push xanderg19/order_api:$TAG
          docker push xanderg19/order_api:latest
  info:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: info rama
        run: echo $GITHUB_REF

      - name: info commit
        run: echo $GITHUB_SHA

      - name: info sistema
        run: echo $RUNNER_OS

      - name: usuario runner
        run: whoami

      - name: carpeta actual
        run: pwd


